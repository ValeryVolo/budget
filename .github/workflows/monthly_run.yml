name: Monthly Budget Sync

on:
  schedule:
    # Runs at 00:00 on the 1st of every month
    - cron: '0 0 12 * *'
  # This allows you to click the "Run workflow" button manually for testing
  workflow_dispatch:

jobs:
  run-sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; else pip install pandas requests; fi

      - name: Run Script
        # THIS IS THE KEY PART YOU WERE MISSING:
        env:
          SHEETY_URL: ${{ secrets.SHEETY_API_URL }}
          ESPENSES_URL: ${{ secrets.EXPENSES_URL }}
        run: python main.py

      - name: Archive processed CSV
        # This saves your CSV so you can download it from the GitHub Actions tab
        uses: actions/upload-artifact@v4
        with:
          name: processed-budget-csv
          path: "*.csv"
          retention-days: 30
